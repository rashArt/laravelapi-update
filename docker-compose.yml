services:
  nginx:
    image: rash07/nginx:base
    container_name: legacy_nginx
    working_dir: /var/www
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - legacy-network
    restart: always
    ports:
      - "8081:80"
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    image: legacy_php_sqlite:8.3
    container_name: legacy_php
    working_dir: /var/www/html
    volumes:
        - ./:/var/www/html
    networks:
        - legacy-network
    restart: always
  redis:
    image: redis:alpine
    container_name: legacy_redis
    volumes:
      - legacy_redis_data:/data
    networks:
      - legacy-network
    restart: always
  mysql:
    image: mysql:8.0
    container_name: legacy_mysql
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - legacy_mysql_data:/var/lib/mysql
    networks:
      - legacy-network
    restart: always

volumes:
  legacy_mysql_data:
  legacy_redis_data:

networks:
  legacy-network:
    external: true
    name: legacy-network
